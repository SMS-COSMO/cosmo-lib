# 推送后自动打包
name: Auto Pack

on:
  push:
    branches:
      - main
jobs:
  # 判断是否开始打包
  whether-pack:
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.check-commit.outputs.should-release }}
      release-version: ${{ steps.check-commit.outputs.release-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check commit messages
        id: check-commit
        run: |
          #!/bin/bash
          set -e

          should_release="false"
          release_version=""

          # 获取最近的提交信息
          commit_message=$(git log -1 --pretty=%B)

          # 检查提交信息中是否包含 [release x.y.z]
          if [[ $commit_message =~ \[release[[:space:]]([0-9]+\.[0-9]+\.[0-9]+)\] ]]; then
            should_release="true"
            release_version="${BASH_REMATCH[1]}"
          fi

          echo "should-release=$should_release" >> $GITHUB_OUTPUT
          echo "release-version=$release_version" >> $GITHUB_OUTPUT
  release: 
    # 仅当 should-release 为 true 时才运行, 自动打包发布
    needs: whether-pack
    if: needs.whether-pack.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm' # pnpm 依赖缓存

      - name: Install pnpm
        run: npm install -g pnpm@9.11.0

      - name: Install dependencies
        run: pnpm install

      - name: Update version in package.json
        run: |
          npm version ${{ needs.whether-pack.outputs.release-version }} --no-git-tag-version

      - name: Commit and push version update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json pnpm-lock.yaml
          git commit -m "chore: bump version to ${{ needs.whether-pack.outputs.release-version }} [skip ci]"
          git push
      
      - name: Build project
        run: pnpm bp
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.whether-pack.outputs.release-version }}
          name: Release v${{ needs.whether-pack.outputs.release-version }}
          body: Automated release for version v${{ needs.whether-pack.outputs.release-version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.whether-pack.outputs.release-version }}
          files: ./release/cosmo-lib-${{ needs.whether-pack.outputs.release-version }}.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}